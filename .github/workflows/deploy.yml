name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio # Hayda daroure la2an project-ak jouwa folder studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Sta'melna 18 kermel el warning

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          CI: false # Kermel ma y-wa'ef el build iza fih warnings basita

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './studio/build' # Bel Create React App, el folder esmo build mesh dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4git add .